name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hep
          POSTGRES_PASSWORD: hep
          POSTGRES_DB: hep
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hep"
          --health-interval 5s --health-timeout 5s --health-retries 10

    env:
      TEST_DATABASE_URL: postgres://hep:hep@localhost:5432/hep?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: vet
        run: go vet ./...

      - name: test
        run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      # Install golangci-lint via `go install` so it is BUILT with the same
      # Go toolchain as the target module (1.26). The prebuilt binaries the
      # golangci-lint-action ships are built with an older Go and refuse to
      # run when the target module declares a newer Go version.
      - name: install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      - name: golangci-lint
        run: golangci-lint run ./...
