name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hep
          POSTGRES_PASSWORD: hep
          POSTGRES_DB: hep
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hep"
          --health-interval 5s --health-timeout 5s --health-retries 10

    env:
      TEST_DATABASE_URL: postgres://hep:hep@localhost:5432/hep?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: vet
        run: go vet ./...

      - name: test
        run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
